name: Deploy to Azure App Service
on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: daisy-therapy-app
  NODE_VERSION: '20.x' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Generate Prisma Client
      run: pnpm db:generate
    
    - name: Build Next.js app
      run: pnpm build
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET}}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        CBT_API_URL: ${{ secrets.CBT_API_URL }}
        CBT_API_KEY: ${{ secrets.CBT_API_KEY }}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        NEXT_PUBLIC_GOOGLE_CLIENT_SECRET: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_SECRET }}
        NEXT_PUBLIC_GOOGLE_OAUTH_REDIRECT: ${{ secrets.NEXT_PUBLIC_GOOGLE_OAUTH_REDIRECT}}

        # Add any other required env vars
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .next/standalone

     
