name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: daisy-therapy-app
  REGISTRY_NAME: cbttherapyregistry
  IMAGE_NAME: daisy-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      # Migrations run at container startup in Azure (scripts/docker-start.sh)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Only non-secret public vars passed as build-args.
      # Secrets are injected at runtime via Azure App Service Settings (step below).
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
          cache-from: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Secrets injected at runtime — never baked into image layers.
      # Required GitHub Secrets: AI_API_KEY, JWT_SECRET, DATABASE_URL, GOOGLE_*,
      # ENCRYPTION_KEY (32+ chars), CRON_SECRET (for /api/internal/cleanup).
      - name: Configure Azure App Service Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "AI_API_KEY",          "value": "${{ secrets.NEXT_PUBLIC_AI_API_KEY }}", "slotSetting": false },
              { "name": "AI_API_URL",          "value": "${{ secrets.NEXT_PUBLIC_AI_API_URL }}", "slotSetting": false },
              { "name": "CBT_API_URL",         "value": "${{ secrets.CBT_API_URL }}",            "slotSetting": false },
              { "name": "CBT_API_KEY",         "value": "${{ secrets.CBT_API_KEY }}",            "slotSetting": false },
              { "name": "JWT_SECRET",          "value": "${{ secrets.JWT_SECRET }}",             "slotSetting": false },
              { "name": "DATABASE_URL",        "value": "${{ secrets.DATABASE_URL }}",           "slotSetting": false },
              { "name": "GOOGLE_CLIENT_ID",    "value": "${{ secrets.GOOGLE_CLIENT_ID }}",       "slotSetting": false },
              { "name": "GOOGLE_CLIENT_SECRET","value": "${{ secrets.GOOGLE_CLIENT_SECRET }}",   "slotSetting": false },
              { "name": "GOOGLE_REDIRECT_URI", "value": "${{ secrets.GOOGLE_REDIRECT_URI }}",    "slotSetting": false },
              { "name": "ENCRYPTION_KEY",      "value": "${{ secrets.ENCRYPTION_KEY }}",         "slotSetting": false },
              { "name": "CRON_SECRET",         "value": "${{ secrets.CRON_SECRET }}",            "slotSetting": false }
            ]

      - name: Azure logout
        run: az logout
