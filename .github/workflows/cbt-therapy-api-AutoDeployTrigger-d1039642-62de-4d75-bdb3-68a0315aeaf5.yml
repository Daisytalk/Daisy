name: Trigger auto deployment for cbt-therapy-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cbt-therapy-api-AutoDeployTrigger-d1039642-62de-4d75-bdb3-68a0315aeaf5.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CBTTHERAPYAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CBTTHERAPYAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CBTTHERAPYAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cbttherapyregistry.azurecr.io
          registryUsername: ${{ secrets.CBTTHERAPYAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CBTTHERAPYAPI_REGISTRY_PASSWORD }}
          containerAppName: cbt-therapy-api
          resourceGroup: Daisy_group
          imageToBuild: cbttherapyregistry.azurecr.io/cbt-therapy-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


