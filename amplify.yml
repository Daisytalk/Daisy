version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - rm -rf node_modules .next
            - pnpm install --frozen-lockfile
            - pnpm prisma generate 
        build:
          commands:
            - echo "NODE_ENV=$NODE_ENV"
            - echo "DATABASE_URL=${DATABASE_URL:0:20}***"
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

