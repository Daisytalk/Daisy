version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - rm -rf node_modules .next
            - pnpm install
            - npx prisma generate
            - pnpm prisma migrate deploy
        build:
          commands:
            - pnpm run build   # only build, do NOT run next export
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
